<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkEdu - Inscription</title>
  <link rel="stylesheet" href="../css/inscription.css">
</head>
<body>

  <div class="register-container">
    
    <div class="logo-wrapper">
      <img src="../images/logo.png" alt="LinkEdu Logo" class="register-logo">
      <h1 class="register-title">Rejoindre LinkEdu</h1>
      <p class="register-subtitle">Créez votre compte pour vous connecter à votre établissement.</p>
    </div>

    <main class="register-main">
      <form id="register-form" class="auth-form">
        
        <div class="input-group">
          <label for="fullname">Nom et Prénom</label>
          <input type="text" id="fullname" placeholder="Ex: Jean Junior" required>
        </div>

        <div class="input-group">
          <label for="email">Adresse Email</label>
          <input type="email" id="email" placeholder="Ex: contact@email.com" required>
        </div>

        <div class="input-group">
          <label for="phone">Numéro de téléphone</label>
          <input type="tel" id="phone" placeholder="Ex: 066000000" required>
        </div>

        <div class="input-group">
          <label for="role">Vous êtes ?</label>
          <select id="role" class="custom-select" required>
            <option value="" disabled selected>Sélectionnez votre profil</option>
            <option value="student">Élève / Étudiant</option>
            <option value="parent">Parent d'élève</option>
            <option value="teacher">Enseignant</option>
          </select>
        </div>

        <div class="input-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Minimum 8 caractères" required>
        </div>

        <a href="../pages/Tele.html" class="btn btn-primary">Créer mon compte</a>
      </form>

      <div class="divider">ou</div>

      <div class="login-section">
        <p>Vous avez déjà un compte ?</p>
        <a href="#" class="btn btn-secondary">Se connecter</a>
      </div>
    </main>
  </div>

</body>
</html>
