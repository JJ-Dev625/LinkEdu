<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkEdu - Connexion</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="login-container">
    
    <header class="login-header">
      <img src="../images/logo.png" alt="Logo LinkEdu" class="login-logo">
      <h2>Link<span>Edu</span></h2>
      <p>Portail de gestion scolaire connecté</p>
    </header>

    <div class="login-form">
      
      <div class="input-group">
        <label for="user-matricule">Matricule ou Email</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="user-matricule" placeholder="Ex: GAB-2026-X" required>
        </div>
      </div>

      <div class="input-group">
        <label for="user-password">Mot de passe</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="user-password" placeholder="••••••••" required>
          
          <button type="button" id="toggle-password" class="toggle-password-btn">
            <i id="eye-icon" class="fa-solid fa-eye"></i>
          </button>
        </div>
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
      </div>

      <div id="error-message" class="error-box" style="display: none;"></div>

      <a href="./dashboard1.html" id="btn-submit-link" class="btn-submit" style="text-align: center; text-decoration: none; display: block;">
        Se connecter
      </a>
    </div>

    <footer class="login-footer">
      <p>Besoin d'aide ? Contactez l'administration.</p>
      <span class="version-tag">v1.0.0 • Gabon</span>
    </footer>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>
